<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Attended Trials</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;font-size:14px}
.page{max-width:1200px;margin:0 auto;padding:28px 20px}
.header{margin-bottom:24px}
.header h1{font-size:22px;font-weight:600;color:#1a1a2e}
.header p{font-size:13px;color:#6b7280;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #e5e7eb}
.stat-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:600;color:#1a1a2e}
.stat-val.danger{color:#dc2626}
.controls{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-group label{font-size:12px;color:#6b7280;white-space:nowrap}
select{font-size:13px;padding:6px 10px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#1a1a2e;cursor:pointer}
.search-wrap{flex:1;min-width:180px}
.search-wrap input{width:100%;font-size:13px;padding:6px 10px 6px 32px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#1a1a2e}
.pills-wrap{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:12px 16px;margin-bottom:16px}
.pills-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#185FA5;color:#185FA5}
.pill.active{background:#185FA5;border-color:#185FA5;color:#fff}
.pill.faded{opacity:.4}
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.day-tab{font-size:12px;padding:5px 14px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#6b7280;cursor:pointer;transition:all .15s;white-space:nowrap}
.day-tab:hover{border-color:#185FA5;color:#185FA5}
.day-tab.active{background:#185FA5;border-color:#185FA5;color:#fff}
.day-tab .cnt{font-size:11px;opacity:.75;margin-left:3px}
.table-card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e7eb}
.table-title{font-size:13px;font-weight:600;color:#1a1a2e}
.row-count{font-size:12px;background:#f4f5f7;color:#6b7280;padding:2px 10px;border-radius:99px}
table{width:100%;border-collapse:collapse}
thead th{background:#f9fafb;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;text-align:left;padding:10px 16px;border-bottom:1px solid #e5e7eb;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:#1a1a2e}
thead th .arr{margin-left:4px;opacity:.4;font-size:9px}
thead th.sort-asc .arr::after{content:'▲'}
thead th.sort-desc .arr::after{content:'▼'}
thead th:not(.sort-asc):not(.sort-desc) .arr::after{content:'⇅'}
tbody td{padding:10px 16px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafb}
.name-link{color:#185FA5;text-decoration:none;font-weight:500}
.name-link:hover{text-decoration:underline}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
.bb1{background:#dbeafe;color:#1e40af}.bb2{background:#bfdbfe;color:#1e3a8a}
.brb1{background:#dcfce7;color:#166534}.brb2{background:#bbf7d0;color:#14532d}
.bab1{background:#fef9c3;color:#854d0e}.bab2{background:#fde68a;color:#78350f}
.bib1{background:#fce7f3;color:#9d174d}
.date-cell,.time-cell,.loc-cell{color:#6b7280;font-size:12px;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:13px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}table{font-size:12px}thead th,tbody td{padding:8px 10px}}
</style>
</head>

function fmtTime(t){const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ap}
function fmtDate(d){const[y,mo,day]=d.split('-');const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const dt=new Date(parseInt(y),parseInt(mo)-1,parseInt(day));return days[dt.getDay()]+' '+mo+'/'+day}

document.getElementById('rowCount').textContent=cnt+' student'+(cnt!==1?'s':'');
document.getElementById('s-ns').textContent=cnt===data.length?'154':cnt;
document.getElementById('s-rate').textContent=cnt===data.length?'28.2%':(Math.round(cnt/547*1000)/10)+'%';
document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
const ci=['name','level','date','time','loc'].indexOf(sortCol);
if(ci>=0)document.querySelectorAll('thead th')[ci].classList.add(sortDir==='asc'?'sort-asc':'sort-desc');
const tbody=document.getElementById('tbody');
if(!rows.length){tbody.innerHTML='<tr><td colspan="5" class="empty">No results</td></tr>';return}
tbody.innerHTML=rows.map(d=>'<tr><td><a class="name-link" href="https://app.lessonbuddy.com/families/'+d.fid+'" target="_blank">'+d.name+'</a></td><td><span class="badge '+badgeClass(d.level)+'">'+d.level+'</span></td><td class="date-cell">'+fmtDate(d.date)+'</td><td class="time-cell">'+fmtTime(d.time)+'</td><td class="loc-cell">'+d.loc+'</td></tr>').join('')}
function colSort(col){if(sortCol===col){sortDir=sortDir==='asc'?'desc':'asc'}else{sortCol=col;sortDir='asc'}document.getElementById('sortBy').value=sortCol;document.getElementById('sortDir').value=sortDir;render()}
function buildDayTabs(){const container=document.getElementById('dayTabs');const counts={};data.forEach(d=>{counts[d.date]=(counts[d.date]||0)+1});
const allTab=document.createElement('div');allTab.className='day-tab active';allTab.innerHTML='All days <span class="cnt">('+data.length+')</span>';allTab.onclick=function(){setDay('All',this)};container.appendChild(allTab);
Object.entries(DAY_MAP).forEach(function(e){const ds=e[0],label=e[1];const c=counts[ds]||0;const t=document.createElement('div');t.className='day-tab'+(c===0?' faded':'');t.innerHTML=label+' <span class="cnt">('+c+')</span>';t.onclick=function(){setDay(ds,this)};container.appendChild(t)})}
function setDay(day,el){document.querySelectorAll('.day-tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');activeDay=day;render()}
function buildPills(){const container=document.getElementById('pills');const allPill=document.createElement('div');allPill.className='pill active';allPill.textContent='All locations';allPill.onclick=function(){setLoc('All',this)};container.appendChild(allPill);
ALL_LOCS.forEach(function(loc){const hasData=data.some(function(d){return d.loc===loc});const p=document.createElement('div');p.className='pill'+(!hasData?' faded':'');p.textContent=loc;p.onclick=function(){setLoc(loc,this)};container.appendChild(p)})}
function setLoc(loc,el){document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active')});el.classList.add('active');activeLoc=loc;render()}
buildDayTabs();buildPills();render();
</script>
</body>
</html>
